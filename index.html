<html lang="en"><head><meta charset="utf-8">
<title>Lishui IoT Extension Spec</title>

<style>
html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#0f1115;color:#e6e8eb;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#171a21;padding:36px 32px;border-radius:14px;width:min(420px,calc(100% - 32px));box-shadow:0 12px 40px rgba(0,0,0,.4);border:1px solid #232833}
h1{font-size:18px;font-weight:600;margin:0 0 6px}
p{font-size:13px;color:#9aa3b2;margin:0 0 22px;line-height:1.5}
input{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:8px;border:1px solid #2a3040;background:#0f1218;color:#e6e8eb;font-size:14px;outline:none;font-family:inherit}
input:focus{border-color:#5b8def}
button{margin-top:14px;width:100%;padding:12px 14px;border-radius:8px;border:0;background:#5b8def;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
button:hover{background:#4a7cdc}button:disabled{opacity:.6;cursor:not-allowed}
.err{color:#ff6b6b;font-size:12px;margin-top:10px;min-height:16px}
#viewer{display:none;height:100vh;width:100%;border:0;background:#fff}
.hint{font-size:11px;color:#5e6878;margin-top:18px;text-align:center}
</style></head><body>
<div id="gate" class="card">
  <h1>Protected document</h1>
  <p>This document is password-protected. Enter the password shared with you to view it.</p>
  <form id="f">
    <input id="pw" type="password" autocomplete="current-password" autofocus placeholder="Password">
    <button id="go" type="submit">Unlock</button>
    <div id="err" class="err"></div>
  </form>
  <div class="hint">Decryption happens entirely in your browser. The password is never sent anywhere.</div>
</div>

const ITERS=600000;
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const data=b64d(BLOB);
  const salt=data.slice(0,16), iv=data.slice(16,32), tag=data.slice(32,64), ct=data.slice(64);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:ITERS,hash:'SHA-256'},km,512);
  const kb=new Uint8Array(bits);
  const aesRaw=kb.slice(0,32), macRaw=kb.slice(32,64);
  const macKey=await crypto.subtle.importKey('raw',macRaw,{name:'HMAC',hash:'SHA-256'},false,['verify']);
  const toMac=new Uint8Array(salt.length+iv.length+ct.length);
  toMac.set(salt,0); toMac.set(iv,salt.length); toMac.set(ct,salt.length+iv.length);
  const ok=await crypto.subtle.verify({name:'HMAC',hash:'SHA-256'},macKey,tag,toMac);
  if(!ok) throw new Error('bad password');
  const aesKey=await crypto.subtle.importKey('raw',aesRaw,{name:'AES-CBC'},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:iv},aesKey,ct);
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('go'),err=document.getElementById('err');
  const pw=document.getElementById('pw').value;
  err.textContent=''; btn.disabled=true; btn.textContent='Unlocking\u2026';
  try{
    const html=await unlock(pw);
    const v=document.getElementById('viewer');
    v.srcdoc=html;
    document.getElementById('gate').style.display='none';
    v.style.display='block';
  }catch(ex){
    err.textContent='Incorrect password.';
    btn.disabled=false; btn.textContent='Unlock';
  }
});
